<h1>GraphQL with Apollo Angular</h1>

<h2>Users</h2>
@if (loading()) {
  <p>Loading…</p>
}
<ul>
  @for (user of users(); track user.id) {
    <li>{{ user.name }} &lt;{{ user.email }}&gt;</li>
  } @empty {
    <li>No users found</li>
  }
</ul>

<h2>Create User</h2>
<input #nameInput placeholder="Name" />
<input #emailInput placeholder="Email" />
<button (click)="createUser(nameInput.value, emailInput.value); nameInput.value=''; emailInput.value=''">
  Create
</button>

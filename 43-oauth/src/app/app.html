<h1>OAuth 2.0 / OIDC con PKCE</h1>

@if (auth.isAuthenticated()) {
  <div class="status authenticated">
    <span class="status-dot"></span>
    Autenticado con PKCE
  </div>
  <button (click)="logout()" class="btn-logout">Cerrar sesión</button>

  <h2>Datos del usuario</h2>
  <pre>{{ auth.userData() | json }}</pre>
} @else {
  <div class="status not-authenticated">
    <span class="status-dot"></span>
    No autenticado
  </div>

  <!-- Login estándar con PKCE (Authorization Code flow) -->
  <button (click)="login()" class="btn-primary">
    Iniciar sesión (Authorization Code + PKCE)
  </button>

  <!-- Login social con diferentes proveedores -->
  <div class="social-login">
    <h3>O inicia sesión con:</h3>
    @for (provider of auth.socialProviders; track provider.id) {
      <button
        (click)="loginWithSocial(provider)"
        class="btn-social"
        [style.backgroundColor]="provider.color"
      >
        {{ provider.name }} — {{ provider.description }}
      </button>
    }
  </div>
}

<h2>Inventory Module</h2>
<table>
  <thead>
    <tr><th>Product</th><th>Stock</th><th>Price</th></tr>
  </thead>
  <tbody>
    @for (item of items(); track item.id) {
      <tr><td>{{ item.name }}</td><td>{{ item.stock }}</td><td>${{ item.price }}</td></tr>
    } @empty {
      <tr><td colspan="3">No items</td></tr>
    }
  </tbody>
</table>
